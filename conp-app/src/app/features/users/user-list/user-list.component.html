<div class="page-container">
  <div class="page-header">
    <div>
      <h1>Usuarios</h1>
      <p class="page-subtitle">{{ users().length }} registrados</p>
    </div>
    <button mat-flat-button class="btn-create" (click)="onCreate()">
      <mat-icon>person_add</mat-icon>
      Nuevo usuario
    </button>
  </div>

  @if (loading()) {
    <div class="loading-box">
      <mat-spinner diameter="36"></mat-spinner>
    </div>
  } @else {
    <table mat-table [dataSource]="users()" class="full-width">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let user">{{ user.name }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Correo</th>
        <td mat-cell *matCellDef="let user" class="mono">{{ user.email }}</td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Rol</th>
        <td mat-cell *matCellDef="let user">
          <mat-chip class="role-chip" [ngClass]="roleClass(user.role)">
            {{ getRoleLabel(user.role) }}
          </mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef>Creado</th>
        <td mat-cell *matCellDef="let user" class="mono">{{ user.createdAt | date: 'dd-MM-yyyy' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let user" class="actions-cell">
          <button mat-icon-button class="btn-edit" (click)="onEdit(user)" aria-label="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button
            mat-icon-button
            class="btn-delete"
            [disabled]="user.id === currentUserId"
            (click)="onDelete(user)"
            aria-label="Eliminar"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    @if (users().length === 0) {
      <div class="empty-state">
        <mat-icon>group_off</mat-icon>
        <p>No hay usuarios registrados todavía.</p>
        <button mat-stroked-button class="btn-create-outline" (click)="onCreate()">
          Crear el primer usuario
        </button>
      </div>
    }
  }
</div>
